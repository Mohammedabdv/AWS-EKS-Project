name: Test, Build and Deploy to EKS

on:
  push:
    branches:
      - main
      
  pull_request:
    branches: 
      - main

env:
  AWS_REGION:     us-east-1
  ECR_REPOSITORY: my-app-repo 
  EKS_CLUSTER:    app_cluster
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

jobs:
  # 1- Test Stage ──────────────────────────────────
  test:
    runs-on: ubuntu-latest 

    # Runs a temporary PostgreSQL container as a service for testing
    services:
      postgres:
        image: postgres:16.3
        env:
          POSTGRES_DB: django_app
          POSTGRES_USER: "django_user" 
          POSTGRES_PASSWORD: "django1234"
        ports:
          - 5432:5432
        options: --health-cmd="pg_isready" --health-interval=10s --health-timeout=5s --health-retries=3 # Waits until PostgreSQL is ready

    steps:
       # Defines the sequence of steps to execute
      - name: Checkout code
        uses: actions/checkout@v4 # Pulls the repository code into the runner

      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
            pip install --upgrade pip setuptools wheel
            pip install -r requirements/dev.txt
        

      

      - name: Run tests
        env:
          DJANGO_SETTINGS_MODULE: settings.dev
          SECRET_KEY: django-insecure-test-key-1234567890
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_DB: django_app
          POSTGRES_USER: django_user
          POSTGRES_PASSWORD: django1234
          STRIPE_SECRET_KEY: sk_test_dummy
          STRIPE_PUBLIC_KEY: pk_test_dummy
          STRIPE_WEBHOOK_SECRET: whsec_dummy
        run: |
            cd app
            python manage.py test

  # 2- Build Stage ────────────────────────────────
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: test   
    outputs:
      image: ${{ steps.build-image.outputs.image }} # Exposes the built Docker image reference from this job so it can be used by other jobs (e.g., deploy)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials # Authenticates the workflow with AWS using credentials stored in GitHub Secrets
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }} 
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}


      # Authenticate with Amazon ECR (Elastic Container Registry)
      - name: Login to Amazon ECR
        id: login-ecr # Give this step an ID so we can reference its outputs later
        uses: aws-actions/amazon-ecr-login@v2

      # Build the Docker image, tag it, and push it to ECR
      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }} # Grab the registry URL from the previous step's output
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
          -f docker/app/dev/Dockerfile .  
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

        # 1- Build the Docker image and tag it with the commit SHA → for traceability, so we can roll back to any previous build
        # 2- Also tag the image as 'latest'  → always points to the newest build used by deployments as a default
        # 3- Push both tags to ECR
        # 4- Save the full image URI as a step output so later  jobs/steps can reference it, e.g. to deploy this exact image to ECS or Kubernetes

  # 3- Deploy Stage ───────────────────────────────
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    # تعريف المتغيرات هنا يجعلها متاحة لكل الخطوات تلقائياً
    env:
      KUBECONFIG: /tmp/kubeconfig 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          # الآن سيقوم AWS CLI بكتابة الملف مباشرة في المسار الذي حددناه فوق
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}
      - name: Debug Identity and Cluster reachability
        run: |
                aws sts get-caller-identity
                kubectl cluster-info
                kubectl get nodes

      - name: Install External Secrets Operator   
        run: |
            helm repo add external-secrets https://charts.external-secrets.io
            helm repo update
            # لا حاجة لتعريف env هنا لأنها موروثة من Job Level
            helm upgrade --install external-secrets external-secrets/external-secrets \
              --namespace external-secrets \
              --create-namespace \
              --wait

      - name: Update deployment image
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        # ملاحظة: نقلنا الـ login لهنا لضمان توفر الـ registry URL للـ sed
        
      - name: Prepare Kubernetes Files
        run: |
          sed -i 's|<ECR_URL>|${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}|g' kubernetes/deployment.yml
          sed -i 's|<ECR_URL>|${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}|g' kubernetes/job.yml

      - name: Apply Kubernetes Configurations
        run: |
          kubectl apply -f kubernetes/namespace.yml
          kubectl apply -f kubernetes/configmap.yml
          kubectl apply -f kubernetes/secret-store.yml
          kubectl apply -f kubernetes/external-secret.yml
          
          # الانتظار حتى يتم إنشاء السكرت
          kubectl wait --for=condition=Ready -n django-app --timeout=60s externalsecret/django-secret || true

      - name: Run migrations
        run: |
          kubectl delete job django-migrate -n django-app --ignore-not-found=true
          kubectl apply -f kubernetes/job.yml

      - name: Deploy to EKS
        run: kubectl apply -f kubernetes/deployment.yml

      - name: Deployment success
        run: echo "Deployment completed successfully!"