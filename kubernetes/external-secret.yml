apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: django-external-secret
  namespace: django-app
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-store
    kind: ClusterSecretStore
  target:
    name: django-secret
  data:
    - secretKey: SECRET_KEY
      remoteRef:
        key: django-app/secrets
        property: SECRET_KEY
    - secretKey: POSTGRES_USER      # ← إصلاح: كان DB_USER، يجب أن يطابق اسم الـ env var اللي يستخدمه Django
      remoteRef:
        key: django-app/secrets
        property: DB_USERNAME
    - secretKey: POSTGRES_PASSWORD  # ← إصلاح: كان DB_PASSWORD، يجب أن يطابق اسم الـ env var اللي يستخدمه Django
      remoteRef:
        key: django-app/secrets
        property: DB_PASSWORD
