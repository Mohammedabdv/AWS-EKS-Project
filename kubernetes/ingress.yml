apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: django-ingress
  namespace: django-app
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    # ← إصلاح: حُذف kubernetes.io/ingress.class (deprecated)، استُبدل بـ spec.ingressClassName أسفل
spec:
  ingressClassName: alb   # ← الطريقة الصحيحة الحديثة لتحديد الـ controller
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: django-service
                port:
                  number: 80
