apiVersion: batch/v1
kind: Job
metadata:
  name: django-migrate
  namespace: django-app
spec:
  ttlSecondsAfterFinished: 300   # ← مضاف: يحذف الـ Job تلقائياً بعد 5 دقائق من انتهائه
  backoffLimit: 2                # ← مضاف: يحاول مرتين قبل ما يعتبره فاشل
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: django-migrate
          image: <ECR_URL>:<IMAGE_TAG>   # ← إصلاح: كان :latest ثابتة، الـ sed في الـ workflow ما كان يشتغل
          command: ["python", "manage.py", "migrate", "--noinput"]
          envFrom:
            - configMapRef:
                name: django-config
            - secretRef:
                name: django-secret
